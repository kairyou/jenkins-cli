name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: "Select mode"
        type: choice
        required: true
        default: edgeone_release
        options:
          - edgeone_release
          - prerelease

jobs:
  release-corss:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'prerelease' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu # x86_64 Linux (GNU)
          - x86_64-unknown-linux-musl # x86_64 Linux (musl)
          - x86_64-pc-windows-gnu # Windows (MinGW)
          - aarch64-unknown-linux-gnu # ARM64 Linux (GNU)
          - aarch64-unknown-linux-musl # ARM64 Linux (musl)
    steps:
      - uses: actions/checkout@v4
      - name: Read Rust toolchain
        id: rust-toolchain
        run: echo "toolchain=$(grep '^channel =' rust-toolchain.toml | cut -d '"' -f 2)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.toolchain }}
          targets: ${{ matrix.target }}
      - name: install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build
        run: cross build --release --target=${{ matrix.target }}
      - name: Package
        run: |
          if [[ "${{ matrix.target }}" == *"-windows-"* ]]; then
            tar -czf jenkins-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release jenkins.exe
          else
            tar -czf jenkins-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release jenkins
          fi
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: jenkins-${{ matrix.target }}
          path: jenkins-${{ matrix.target }}.*

  release-windows:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'prerelease' }}
    runs-on: windows-latest
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc # Windows (MSVC)
    steps:
      - uses: actions/checkout@v4
      - name: Read Rust toolchain
        id: rust-toolchain
        shell: bash
        run: echo "toolchain=$(grep '^channel =' rust-toolchain.toml | cut -d '"' -f 2)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.toolchain }}
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target=${{ matrix.target }}
      - name: Package
        run: tar -czf jenkins-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release jenkins.exe
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: jenkins-${{ matrix.target }}
          path: jenkins-${{ matrix.target }}.*

  release-apple:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'prerelease' }}
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin # Intel Mac
          - aarch64-apple-darwin # M1/M2 Mac
    steps:
      - uses: actions/checkout@v4
      - name: Read Rust toolchain
        id: rust-toolchain
        run: echo "toolchain=$(grep '^channel =' rust-toolchain.toml | cut -d '"' -f 2)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.toolchain }}
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target=${{ matrix.target }}
      - name: Package
        run: tar -czf jenkins-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release jenkins
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: jenkins-${{ matrix.target }}
          path: jenkins-${{ matrix.target }}.*

  # release-wasm:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #       with:
  #         targets: wasm32-unknown-unknown
  #     - name: install wasm-pack
  #       run: cargo install wasm-pack
  #     - name: Build
  #       run: wasm-pack build --target web

  create-release:
    needs: [release-corss, release-windows, release-apple]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'prerelease' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" = "prerelease" ]; then
            TAG="prerelease"
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          else
            TAG="${{ github.ref_name }}"
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: jenkins-*
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -type f
      - name: Prepare release artifacts
        run: |
          set -euo pipefail

          expected_targets=(
            x86_64-unknown-linux-gnu
            x86_64-unknown-linux-musl
            x86_64-pc-windows-gnu
            aarch64-unknown-linux-gnu
            aarch64-unknown-linux-musl
            x86_64-pc-windows-msvc
            x86_64-apple-darwin
            aarch64-apple-darwin
          )

          actual_count="$(find artifacts -maxdepth 1 -type f -name 'jenkins-*.tar.gz' | wc -l | tr -d ' ')"
          expected_count="${#expected_targets[@]}"
          if [ "${actual_count}" -ne "${expected_count}" ]; then
            echo "Expected ${expected_count} release archives, found ${actual_count}" >&2
            find artifacts -maxdepth 1 -type f -name 'jenkins-*.tar.gz' -print >&2
            exit 1
          fi

          artifacts_json="[]"
          : > artifacts/checksums.txt

          for target in "${expected_targets[@]}"; do
            archive="jenkins-${target}.tar.gz"
            path="artifacts/${archive}"
            if [ ! -f "${path}" ]; then
              echo "Missing release archive: ${archive}" >&2
              exit 1
            fi

            sha256="$(sha256sum "${path}" | awk '{print $1}')"
            printf '%s  %s\n' "${sha256}" "${archive}" >> artifacts/checksums.txt

            os=""
            arch=""
            libc=""
            case "${target}" in
              x86_64-unknown-linux-gnu) os="linux"; arch="x86_64"; libc="gnu" ;;
              x86_64-unknown-linux-musl) os="linux"; arch="x86_64"; libc="musl" ;;
              aarch64-unknown-linux-gnu) os="linux"; arch="aarch64"; libc="gnu" ;;
              aarch64-unknown-linux-musl) os="linux"; arch="aarch64"; libc="musl" ;;
              x86_64-pc-windows-gnu) os="windows"; arch="x86_64"; libc="gnu" ;;
              x86_64-pc-windows-msvc) os="windows"; arch="x86_64"; libc="msvc" ;;
              x86_64-apple-darwin) os="macos"; arch="x86_64" ;;
              aarch64-apple-darwin) os="macos"; arch="aarch64" ;;
            esac

            url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${archive}"
            artifacts_json="$(jq -c \
              --arg target "${target}" \
              --arg os "${os}" \
              --arg arch "${arch}" \
              --arg libc "${libc}" \
              --arg archive "${archive}" \
              --arg sha256 "${sha256}" \
              --arg url "${url}" \
              '. + [{
                target: $target,
                os: $os,
                arch: $arch,
                libc: (if $libc == "" then null else $libc end),
                archive: $archive,
                sha256: $sha256,
                url: $url
              }]' <<< "${artifacts_json}")"
          done

          jq -n \
            --arg name "jenkins-cli" \
            --arg binary "jenkins" \
            --arg version "${RELEASE_TAG#v}" \
            --arg tag "${RELEASE_TAG}" \
            --arg repository "https://github.com/${GITHUB_REPOSITORY}" \
            --argjson artifacts "${artifacts_json}" \
            '{
              name: $name,
              binary: $binary,
              version: $version,
              tag: $tag,
              repository: $repository,
              artifacts: $artifacts
            }' > artifacts/dist-manifest.json

          cat artifacts/checksums.txt
          jq . artifacts/dist-manifest.json
      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: jenkins-release-metadata
          path: |
            artifacts/checksums.txt
            artifacts/dist-manifest.json
      - name: Delete existing release (if needed)
        run: |
          gh release delete "${RELEASE_TAG}" --yes || true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" = "prerelease" ]; then
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" || true
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: artifacts/*
          generate_release_notes: true
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ env.PRERELEASE }}
# "Settings" > "Actions" > "General"
# "Workflow permissions" > "Read and write permissions"

  deploy-edgeone:
    needs: create-release
    if: ${{ always() && ((github.event_name == 'workflow_dispatch' && inputs.mode == 'edgeone_release') || needs.create-release.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts (workflow)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'prerelease' }}
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: jenkins-*
          merge-multiple: true
      - name: Download artifacts (edgeone_release)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'edgeone_release' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download --pattern "jenkins-*" --dir artifacts
          gh release download --pattern "checksums.txt" --dir artifacts || true
          gh release download --pattern "dist-manifest.json" --dir artifacts || true
      - name: Prepare EdgeOne directory
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p edgeone_dist/scripts
          mkdir -p edgeone_dist/edge-functions
          cp scripts/edgeone/install.sh edgeone_dist/scripts/install.sh
          cp scripts/edgeone/index.html edgeone_dist/index.html
          cp -r scripts/edgeone/edge-functions/gh edgeone_dist/edge-functions/
          cp artifacts/* edgeone_dist/
          LATEST_TAG="$(gh release view --json tagName -q .tagName 2>/dev/null || true)"
          echo "${LATEST_TAG}" > edgeone_dist/latest.txt
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
      - name: Deploy to EdgeOne Pages
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
          EDGEONE_PROJECT_NAME: ${{ vars.EDGEONE_PROJECT_NAME }}
        run: |
          test -n "${EDGEONE_API_TOKEN}" || { echo "EDGEONE_API_TOKEN is empty"; exit 1; }
          EDGEONE_API_TOKEN="$(printf '%s' "${EDGEONE_API_TOKEN}" | tr -d '\r\n')"
          echo "EDGEONE token length: ${#EDGEONE_API_TOKEN}"
          export NODE_OPTIONS="--dns-result-order=ipv4first"
          npx -y edgeone@1.2.29 pages deploy ./edgeone_dist -n "${EDGEONE_PROJECT_NAME}" -t "${EDGEONE_API_TOKEN}"
